server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import: optional:file:.env[.properties]
  kafka:
    bootstrap-servers: ${KAFKA_NODES}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      group-id: bot
      auto-offset-reset: latest
      properties:
        specific:
          avro:
            reader: true
        schema:
          registry:
            url: ${SCHEMA_REGISTRY_URL}

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false
  scrapper:
    base-url: ${SCRAPPER_URL:http://localhost:8081}
  kafka:
    topic:
      link-update:
        name: link-update
