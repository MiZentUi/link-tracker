server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import: optional:file:.env[.properties]
  kafka:
    bootstrap-servers: ${KAFKA_NODES}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: bot
      auto-offset-reset: latest
      properties:
        spring:
          json:
            trusted:
              packages: "backend.academy.linktracker.bot.dto"
            type:
              mapping: backend.academy.linktracker.scrapper.dto.LinkUpdate:backend.academy.linktracker.bot.dto.LinkUpdate

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false
  scrapper:
    base-url: ${SCRAPPER_URL:http://localhost:8081}
  kafka:
    topic:
      link-update:
        name: link-update
