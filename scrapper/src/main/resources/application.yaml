server:
  port: 8081

spring:
  application:
    name: scrapper
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${POSTGRES_URL:localhost:5432}/scrapper
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: file:migrations/master.yaml

app:
  bot:
    base-url: ${BOT_URL:http://localhost:8080}
  stackoverflow:
    base-url: https://api.stackexchange.com/2.1
    key: ${STACKOVERFLOW_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
    access-token: ${STACKOVERFLOW_ACCESS_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
  github:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
  updates:
    fixed-delay:
      in:
        seconds: 10
  repository:
    access-type: orm
