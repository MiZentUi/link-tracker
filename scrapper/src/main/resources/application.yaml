server:
  port: 8081

spring:
  application:
    name: scrapper
  config:
    import: optional:file:.env[.properties]

app:
  bot:
    base-url: http://localhost:8080
  stackoverflow:
    base-url: https://api.stackexchange.com/2.1
    key: ${STACKOVERFLOW_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
    access-token: ${STACKOVERFLOW_ACCESS_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
  github:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
