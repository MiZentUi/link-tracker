services:
  db-scrapper:
    image: postgres:16-alpine
    env_file:
      .env
    environment:
      POSTGRES_DB: scrapper
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scrapper:
    build:
      context: scrapper
      dockerfile: Dockerfile
    depends_on:
      db-scrapper:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - BOT_URL=http://bot:8080
    healthcheck:
      test: "curl -f http://localhost:8081/actuator/health"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  bot:
    build:
      context: bot
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      scrapper:
        condition: service_healthy
    environment:
      SCRAPPER_URL: http://scrapper:8081

volumes:
  db-data: