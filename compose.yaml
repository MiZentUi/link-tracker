services:
  postgres:
    image: postgres:16-alpine
    ports:
      - 5432:5432
    env_file:
      .env
    environment:
      POSTGRES_DB: scrapper
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: "pg_isready -U $$POSTGRES_USER -d scrapper"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scrapper:
    build:
      context: scrapper
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      bot:
        condition: service_healthy
      kafka-0:
        condition: service_started
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgres:5432
      BOT_URL: http://bot:8080
      KAFKA_NODES: kafka-0:9092,kafka-1:9092,kafka-2:9092
    healthcheck:
      test: "curl -f http://localhost:8081/actuator/health"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  bot:
    build:
      context: bot
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      kafka-0:
        condition: service_started
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
    environment:
      SCRAPPER_URL: http://scrapper:8081
      KAFKA_NODES: kafka-0:9092,kafka-1:9092,kafka-2:9092
    healthcheck:
      test: "curl -f http://localhost:8080/actuator/health"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  liquibase-migrations:
    container_name: migrations
    image: liquibase/liquibase:4.33
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      .env
    environment:
      POSTGRES_DB: scrapper
    command:
      - --searchPath=/changesets
      - --changelog-file=master.yaml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://postgres:5432/scrapper
      - --username=${POSTGRES_USER}
      - --password=${POSTGRES_PASSWORD}
      - update
    volumes:
      - ./migrations:/changesets

  kafka-0:
    image: apache/kafka:4.3.0
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091,EXTERNAL://kafka-0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093

  kafka-1:
    image: apache/kafka:4.3.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9091,EXTERNAL://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093

  kafka-2:
    image: apache/kafka:4.3.0
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9091,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9091,EXTERNAL://kafka-2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    hostname: kafka-ui
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
    ports:
      - 8082:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-0:9091,kafka-1:9091,kafka-2:9091
      DYNAMIC_CONFIG_ENABLED: true

volumes:
  db-data: